<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Fatima Baji</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
:root {
    --bg1: #ffd6e8;
    --bg2: #d6f0ff;
    --accent: #ff4d88;
}

body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, var(--bg1), var(--bg2));
    background-size: 400% 400%;
    animation: gradientMove 12s ease infinite;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    overflow-x: hidden;
}

@keyframes gradientMove {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

/* Main Card */
.container {
    position: relative;
    z-index: 2;
    width: 90%;
    max-width: 600px;
    padding: 40px 30px;
    border-radius: 25px;
    background: rgba(255,255,255,0.6);
    backdrop-filter: blur(15px);
    text-align: center;
    box-shadow: 0 20px 40px rgba(0,0,0,0.15);
    animation: fadeIn 1s ease;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
}

h1 {
    font-size: clamp(1.8rem, 6vw, 2.8rem);
    color: var(--accent);
    margin-bottom: 15px;
}

.typing {
    font-size: clamp(1rem, 4vw, 1.15rem);
    line-height: 1.7;
    min-height: 60px;
    margin-bottom: 25px;
    color: #333;
}

button {
    padding: 14px 24px;
    border: none;
    border-radius: 30px;
    background: var(--accent);
    color: white;
    font-size: 1rem;
    cursor: pointer;
    transition: 0.3s;
    box-shadow: 0 8px 20px rgba(255,77,136,0.4);
}

button:hover {
    transform: translateY(-3px);
    box-shadow: 0 12px 25px rgba(255,77,136,0.6);
}

/* Popup */
.popup {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    backdrop-filter: blur(6px);
    display: none;
    justify-content: center;
    align-items: center;
    padding: 20px;
    z-index: 5;
}

.popup-content {
    background: white;
    padding: 30px;
    border-radius: 20px;
    max-width: 400px;
    width: 100%;
    text-align: center;
    animation: pop 0.4s ease;
}

.popup-content h2 {
    color: var(--accent);
}

.popup-content p {
    line-height: 1.6;
}

.close {
    position: absolute;
    right: 25px;
    top: 15px;
    font-size: 22px;
    cursor: pointer;
}

@keyframes pop {
    from { transform: scale(0.7); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
}

/* Floating Hearts */
.heart {
    position: absolute;
    bottom: -10px;
    font-size: 20px;
    animation: float 4s linear forwards;
}

@keyframes float {
    0% { transform: translateY(0); opacity: 1; }
    100% { transform: translateY(-100vh); opacity: 0; }
}

canvas {
    position: fixed;
    top: 0;
    left: 0;
    z-index: 1;
}
</style>
</head>

<body>

<canvas id="confetti"></canvas>

<div class="container">
    <h1>🎉 Happy Birthday Fatima Baji 🎉</h1>
    <div class="typing" id="message"></div>
    <button onclick="showPopup()">Send Love 💖</button>
</div>

<div id="popup" class="popup">
    <div class="popup-content">
        <span class="close" onclick="closePopup()">&times;</span>
        <h2>🌸 A Special Message 🌸</h2>
        <p>
            Loving Baji,<br><br>
            Your dedication and kindness make learning beautiful.
            May your birthday bring endless happiness,
            success, and blessings for you. 💖<br><br>
            You are just Amazing!
        </p>
    </div>
</div>

<script>
// Typing Effect
const text = "Thank you for your guidance and constant support. May your life be filled with success and joy. You are truly an inspiring teacher!";
let index = 0;
function typeEffect() {
    if (index < text.length) {
        document.getElementById("message").innerHTML += text.charAt(index);
        index++;
        setTimeout(typeEffect, 35);
    }
}
typeEffect();

// Popup
function showPopup() {
    document.getElementById("popup").style.display = "flex";
    launchHearts();
}

function closePopup() {
    document.getElementById("popup").style.display = "none";
}

// Floating Hearts
function launchHearts() {
    for (let i = 0; i < 25; i++) {
        const heart = document.createElement("div");
        heart.className = "heart";
        heart.innerHTML = "💖";
        heart.style.left = Math.random() * 100 + "vw";
        heart.style.color = "hsl(" + Math.random()*360 + ",70%,70%)";
        document.body.appendChild(heart);
        setTimeout(() => heart.remove(), 4000);
    }
}

// Confetti
const canvas = document.getElementById("confetti");
const ctx = canvas.getContext("2d");

function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener("resize", resizeCanvas);

let pieces = [];
for (let i = 0; i < 120; i++) {
    pieces.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        r: Math.random() * 6 + 2,
        d: Math.random() * 100
    });
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = "rgba(255,77,136,0.8)";
    ctx.beginPath();
    pieces.forEach(p => {
        ctx.moveTo(p.x, p.y);
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    });
    ctx.fill();
    update();
}

function update() {
    pieces.forEach(p => {
        p.y += Math.cos(p.d) + 1 + p.r/2;
        if (p.y > canvas.height) {
            p.y = 0;
            p.x = Math.random() * canvas.width;
        }
    });
}

setInterval(draw, 20);
</script>

</body>
</html>
